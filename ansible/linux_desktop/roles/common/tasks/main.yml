---
- name: Ensure timezone is Europe/Helsinki
  community.general.timezone:
    name: Europe/Helsinki
  tags:
    - timezone
    - common

- name: Ensure LANG is en_GB.UTF-8
  ansible.builtin.command: /usr/bin/localectl set-locale LANG=en_GB.UTF-8
  changed_when: true
  tags:
    - lang
    - common

- name: Ensure keymap is fi
  ansible.builtin.command: /usr/bin/localectl set-keymap fi
  changed_when: true
  tags:
    - keymap
    - common

- name: Ensure banner is set
  ansible.builtin.copy:
    src: issue.net
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'
  tags:
    - banner
    - common

- name: Ensure core dumps is disabled
  ansible.builtin.lineinfile:
    dest: /etc/security/limits.conf
    regexp: '^[#]*\*.*core.*0'
    line: '*               hard    core            0'
  tags:
    - core_dump
    - common

- name: Copy /etc/systemd/coredump.conf
  ansible.builtin.copy:
    src: coredump.conf
    dest: /etc/systemd/coredump.conf
    owner: root
    group: root
    mode: '0640'
  tags:
    - core_dump
    - common

- name: Ensure core suid core dumps is disabled
  ansible.builtin.lineinfile:
    dest: /lib/sysctl.d/50-coredump.conf
    regexp: '^fs.suid_dumpable=2'
    line: '#fs.suid_dumpable=2'
  tags:
    - core_dump
    - sysctl
    - common

- name: Copy journald.conf
  ansible.builtin.copy:
    src: journald.conf
    dest: /etc/systemd/journald.conf
    owner: root
    group: root
    mode: '0640'
  tags:
    - journald
    - common

- name: Ensure the default umask is defined correctly
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: 'umask 022'
    replace: 'umask 027'
  loop:
    - /etc/bashrc
    - /etc/profile
    - /etc/csh.cshrc
  tags:
    - umask
    - common

- name: Ensure the default umask is appended correctly
  ansible.builtin.lineinfile:
    path: /etc/profile
    line: 'umask 027'
  tags:
    - umask
    - common

- name: Replace user UMASK in /etc/login.defs
  ansible.builtin.replace:
    path: /etc/login.defs
    regexp: '^(\s*)UMASK(\s+).*'
    replace: '\g<1>UMASK\g<2>027'
  tags:
    - umask
    - common

- name: Copy /etc/sudoers
  ansible.builtin.copy:
    src: sudoers
    dest: /etc/sudoers
    owner: root
    group: root
    mode: '0440'
  tags:
    - sudo
    - common

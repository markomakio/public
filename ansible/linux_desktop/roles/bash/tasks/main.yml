---
- name: Create ~/.bashrc.d directory
  become: false
  ansible.builtin.file:
    path: "/home/{{ username | default(ansible_env['USERNAME']) }}/.bashrc.d"
    state: directory
    owner: "{{ username | default(ansible_env['USERNAME']) }}"
    group: "{{ groupname | default(ansible_env['USERNAME']) }}"
    mode: '0755'
  tags:
    - bash_user
    - bash

- name: Copy bashrc files to ~/.bashrc.d directory
  become: false
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/home/{{ username | default(ansible_env['USERNAME']) }}/.bashrc.d"
    owner: "{{ username | default(ansible_env['USERNAME']) }}"
    group: "{{ groupname | default(ansible_env['USERNAME']) }}"
    mode: '0644'
  loop:
    - bash_history.bashrc
    - bash_prompt.bashrc
  tags:
    - bash_user
    - bash

- name: Copy bash_logging.sh
  ansible.builtin.copy:
    src: bash_logging.sh
    dest: /etc/profile.d/bash_logging.sh
    owner: root
    group: root
    mode: '0644'
  tags:
    - bash_system
    - bash

- name: Copy auditd.conf
  ansible.builtin.copy:
    src: auditd.conf
    dest: /etc/audit/auditd.conf
    owner: root
    group: root
    mode: '0640'
  tags:
    - audit

- name: Copy audit rule templates
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/audit/rules.d/
    remote_src: true
    owner: root
    group: root
    mode: '0640'
  loop:
    - /usr/share/audit-rules/10-base-config.rules
    - /usr/share/audit-rules/30-pci-dss-v31.rules
    - /usr/share/audit-rules/43-module-load.rules
  notify: Load audit rules
  tags:
    - audit

- name: Copy audit rules
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/audit/rules.d/
    owner: root
    group: root
    mode: '0640'
  loop:
    - 50-openscap-pci-dss.rules
    - 31-privileged.rules
    - 99-finalize.rules
  notify: Load audit rules
  tags:
    - audit

- name: Check if audit is already configured in grub
  ansible.builtin.command:
    cmd: /usr/bin/cat /etc/default/grub
  changed_when: false
  register: audit_check
  tags:
    - audit

- name: Ensure audit is configured in grub
  ansible.builtin.command: /usr/sbin/grubby --update-kernel=ALL --args="audit=1 audit_backlog_limit=8192"
  when: "'audit=1 audit_backlog_limit=8192' not in audit_check.stdout"
  changed_when: true
  tags:
    - audit
